<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="chitchat — VibeSmith 동적 페르소나 AI 롤플레이 채팅 플랫폼">
    <title>chitchat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
    <div id="app">
        <!-- 사이드바 네비게이션 -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <h1 class="app-title">chitchat</h1>
                <span class="app-version">v1.0.0</span>
            </div>
            <ul class="nav-list">
                <li class="nav-item active" data-page="chat">💬 채팅</li>
                <li class="nav-item" data-page="providers">🔌 공급자</li>
                <li class="nav-item" data-page="models">⚙️ 모델 설정</li>
                <li class="nav-item" data-page="personas">🤖 페르소나</li>
                <li class="nav-item" data-page="lorebooks">📖 로어북</li>
                <li class="nav-item" data-page="worldbooks">🌍 월드북</li>
                <li class="nav-item" data-page="chat-profiles">🎯 채팅 프로필</li>
                <li class="nav-item" data-page="prompt-order">📝 프롬프트 순서</li>
            </ul>
            <div class="sidebar-footer">
                <div class="nav-item" data-page="settings">⚡ 설정</div>
            </div>
        </nav>

        <!-- 메인 콘텐츠 영역 -->
        <main id="content">
            <div id="page-container">
                <div class="welcome-screen">
                    <h2>🎭 chitchat에 오신 것을 환영합니다</h2>
                    <p>VibeSmith 동적 페르소나 시스템으로 살아있는 AI 캐릭터를 만들어보세요.</p>
                    <p class="subtitle">왼쪽 메뉴에서 시작하세요.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- API 클라이언트 + 페이지 모듈 (순서 중요: api → pages → app) -->
    <script src="/js/api.js?v=4"></script>
    <script src="/js/pages/providers.js?v=4"></script>
    <script src="/js/pages/models.js?v=4"></script>
    <script src="/js/pages/personas.js?v=4"></script>
    <script src="/js/pages/lorebooks.js?v=4"></script>
    <script src="/js/pages/worldbooks.js?v=4"></script>
    <script src="/js/pages/chat_profiles.js?v=4"></script>
    <script src="/js/pages/prompt_order.js?v=4"></script>
    <script src="/js/pages/chat.js?v=4"></script>
    <script src="/js/pages/settings.js?v=4"></script>
    <script src="/js/app.js?v=4"></script>
</body>
</html>
