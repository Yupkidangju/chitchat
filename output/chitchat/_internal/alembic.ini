[alembic]
script_location = alembic
# 실제 런타임에서는 migrations.py가 프로그래밍 방식으로 engine URL을 주입한다.
# 이 URL은 CLI에서 직접 alembic 명령 실행 시에만 사용된다.
sqlalchemy.url = sqlite:///chitchat.sqlite3

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
